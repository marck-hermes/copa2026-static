name: Update Copa 2026 Data

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:  # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pydantic beautifulsoup4 lxml jinja2

      - name: Fetch source data
        run: python src/fetch.py
        continue-on-error: false

      - name: Transform & validate
        run: python src/transform.py
        continue-on-error: false

      - name: Generate bracket
        run: python src/bracket.py

      - name: Generate static HTML
        run: python src/generate.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet dist/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/ raw/ data/
          git commit -m "chore: update Copa 2026 data ($(date -u +%Y-%m-%d_%H:%M UTC))"
          git push

      - name: Skip deploy
        if: steps.check_changes.outputs.changed == 'false'
        run: echo "No changes, skipping deploy"

  deploy:
    needs: update
    if: needs.update.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./