name: Update Copa 2026 Data

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch source data
        run: python src/fetch.py

      - name: Transform & validate
        run: python src/transform.py

      - name: Generate bracket
        run: python src/bracket.py

      - name: Generate static HTML
        run: python src/generate.py

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet dist/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config github-actions[bot] && git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add dist/ raw/ data/
          git commit -m "chore: update Copa 2026 data (automated)"
          git push

  deploy:
    needs: update
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'